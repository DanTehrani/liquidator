previews:
  generation: automatic

services:
  - type: worker
    name: liquidator
    plan: starter
    runtime: node
    region: frankfurt
    buildCommand: pnpm install && pnpm db:generate && pnpm build
    startCommand: pnpm tsx src/index.ts
    autoDeploy: true
    envVars:
      - fromGroup: liquidator
      - key: DATABASE_URL
        fromDatabase:
          name: liquidator
          property: connectionString


databases:
  - name: liquidator
    databaseName: liquidator
    region: singapore
    plan: basic-256mb
    postgresMajorVersion: 18

